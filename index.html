<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>DG TV LIVE RADIO</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://stream.zeno.fm">

    <link rel="icon" href="assets/logo.png">
</head>

<body>

<div class="background-glow"></div>

<div class="player-container">

    <div class="player-border"></div>

    <div class="player">

        <!-- LOGO -->

        <div class="logo-area">

            <img
                src="assets/logo.png"
                alt="DG TV LIVE RADIO"
                id="logo">

        </div>

        <!-- INFO -->

        <div class="info">

            <div class="live">

                <span class="live-dot"></span>

                <span>ON AIR</span>

            </div>

            <h1>DG TV LIVE RADIO</h1>

            <p class="subtitle">
                La migliore musica • 24 ore su 24
            </p>

            <div class="now-playing">

                <span class="label">

                    NOW PLAYING

                </span>

                <span id="trackTitle">

                    Premere PLAY

                </span>

            </div>

        </div>

        <!-- PLAYER -->

        <div class="controls">

            <button id="playButton">

                <svg viewBox="0 0 24 24">

                    <path
                        d="M8 5v14l11-7z"
                        fill="currentColor"/>

                </svg>

            </button>

            <button id="muteButton">

                🔊

            </button>

            <input
                type="range"
                id="volume"
                min="0"
                max="100"
                value="80">

        </div>

    </div>

</div>

<!-- VISUALIZER -->

<div class="visualizer">

    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>
    <span></span>

</div>

<!-- AUDIO -->

<audio id="radio">

    <source
        src="https://stream.zeno.fm/ki5fhhpz6lptv.m3u"
        type="audio/mpeg">

</audio>

<!-- LOADER -->

<div id="loader">

    Connessione...

</div>

<script src="script.js"></script>

</body>
</html>
